        temporal cloud account audit-log sink list
        temporal cloud account audit-log sink list --page-size 50
    has-init: false
    option-sets:
      - client
    options:
      - name: page-size
        type: int
        description: |
          Number of sinks to retrieve per page. Cannot exceed 1000. Defaults to 100.
      - name: page-token
        type: string
        description: |
          Page token from a previous response to retrieve the next page.

  - name: cloud account audit-log sink delete
    summary: Delete an audit log sink
    description: |
