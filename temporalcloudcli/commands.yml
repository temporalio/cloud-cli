# Temporal Cloud CLI commands
commands:
  - name: cloud
    summary: Temporal Cloud command-line interface
    description: |
      The Temporal Cloud CLI provides commands for managing and operating Temporal Cloud resources,
      including namespaces, users, and account settings.

      Example:

      ```
      cloud namespace get --namespace my-namespace.my-account
      ```
    has-init: true
    option-sets:
      - client
      - common
    options:
      - name: config-dir
        type: string
        description: |
          Directory path where CLI configuration files are stored, including
          authentication tokens and settings.
      - name: disable-pop-up
        type: bool
        description: |
          Prevent the CLI from opening a browser window during authentication.
          Useful for headless environments or when using alternative auth methods.
      - name: auto-confirm
        type: bool
        description: |
          Automatically confirm prompts and actions that require user
          confirmation. Useful for scripting and automation.
  - name: cloud login
    summary: Authenticate with Temporal Cloud
    description: |
      Authenticate with Temporal Cloud using browser-based OAuth login.

      This command opens your default browser to complete authentication. Once
      logged in, your credentials are stored locally for subsequent commands.

      Example:

      ```
      cloud login
      ```

      For headless environments, use --disable-pop-up and follow the printed URL.
    has-init: false
    docs:
      keywords:
        - login
        - authentication
        - auth
      description-header: Login
      tags:
        - login
    options:
      - name: domain
        type: string
        hidden: true
        description: |
          Authentication domain for the OAuth provider.
        default: login.tmprl-test.cloud
      - name: audience
        type: string
        hidden: true
        default: https://saas-api.tmprl-test.cloud
        description: |
          OAuth audience parameter for token generation.
      - name: client-id
        type: string
        hidden: true
        default: XBimMwn90eAnjsiGVbAJ3Hgd9z06jjJB
        description: |
          OAuth client identifier for authentication.
      - name: redirect-url
        type: string
        hidden: true
        default: http://127.0.0.1:56628/callback
        description: |
          Redirect URL for OAuth authentication flow. 
      - name: reset
        type: bool
        description: |
          Clear stored login credentials and configuration, then re-authenticate.
          Use this if you need to switch accounts or fix authentication issues.
  - name: cloud whoami
    summary: Display the current authenticated identity
    description: |
      Display information about the currently authenticated identity.

      Shows whether you are authenticated as a user or service account, along
      with the associated API key if one is in use.

      Example:

      ```
      cloud whoami
      ```
    has-init: false
    option-sets:
      - client
    docs:
      keywords:
        - whoami
        - identity
        - authentication
      description-header: Who Am I
      tags:
        - authentication
  - name: cloud logout
    summary: Clear Temporal Cloud authentication credentials
    description: |
      Log out from Temporal Cloud by clearing stored authentication tokens
      and credentials from the local configuration.

      Example:

      ```
      cloud logout
      ```
    has-init: false
    docs:
      keywords:
        - logout
        - authentication
        - auth
      description-header: Logout
      tags:
        - login
    options:
      - name: domain
        type: string
        hidden: true
        description: |
          Authentication domain for the OAuth provider.
        default: login.tmprl-test.cloud
        
  # Namespace commands
  - name: cloud namespace
    summary: Manage Temporal Cloud namespaces
    description: |
      Commands for creating, updating, and managing Temporal Cloud namespaces.

      Namespaces provide isolation for workflows and activities. Each namespace
      has its own configuration including retention period, region, and access
      controls.
    has-init: false
    docs:
      keywords:
        - namespace
        - management
      description-header: Namespace Management Commands
      tags:
        - namespaces
  - name: cloud namespace get
    summary: Retrieve namespace details
    description: |
      Retrieve the configuration and status of a Temporal Cloud namespace.

      Returns details including region, retention period, endpoints, and
      certificate information.

      Example:

      ```
      cloud namespace get --namespace my-namespace.my-account
      ```
    has-init: false
    option-sets:
      - client
    docs:
      keywords:
        - namespace
        - management
      description-header: Retrieve a namespace.
      tags:
        - namespaces
    options:
      - name: namespace
        required: true
        type: string
        description: |
          The fully qualified namespace name in the format 'namespace.account'
          (e.g., 'my-namespace.my-account').
        short: n
      - name: spec
        type: bool
        description: |
          Output only the namespace specification in JSON format, omitting
          metadata and status information.
  - name: cloud namespace apply
    summary: Create or update a namespace from a specification
    description: |
      Apply a namespace configuration to Temporal Cloud. Creates a new namespace
      if it doesn't exist, or updates an existing one to match the specification.

      The specification can be provided as inline JSON or loaded from a file
      by prefixing the path with '@'.

      Example with inline JSON:

      ```
      cloud namespace apply --spec '{"name": "namespace-name", "region": "us-west-2", "retention_days": 7}'
      ```

      Example with file path:

      ```
      cloud namespace apply --spec @namespace-spec.json
      ```
    has-init: false
    option-sets:
      - client
      - diff
    options:
      - name: spec
        type: string
        description: |
          Namespace configuration in JSON format. Provide inline JSON directly,
          or use '@path/to/file.json' to load from a file.
        required: true
      - name: async-operation-id
        type: string
        description: |
          Custom identifier for tracking this async operation. If not provided,
          a unique ID is generated automatically.
      - name: idempotent
        type: bool
        description: |
          Succeed silently if the namespace already matches the specification.
          Without this flag, the command errors when no changes are needed.
      - name: async
        type: bool
        description: |
          Return immediately after initiating the operation instead of waiting
          for completion. Use the returned operation ID to check status later.
      - name: resource-version
        type: string
        short: v
        description: |
          Resource version for optimistic concurrency control. If not provided,
          the current version is fetched automatically.
  - name: cloud namespace edit
    summary: Interactively edit a namespace configuration
    description: |
      Open a namespace configuration in your default editor for interactive
      modification. After saving and closing the editor, the changes are
      applied to Temporal Cloud.

      The editor is determined by the EDITOR environment variable, falling
      back to 'vi' if not set.

      Example:

      ```
      cloud namespace edit --namespace my-namespace.my-account
      ```
    has-init: false
    option-sets:
      - client
      - diff
    options:
      - name: namespace
        type: string
        description: |
          The fully qualified namespace name in the format 'namespace.account'
          (e.g., 'my-namespace.my-account').
        short: n
        required: true
      - name: async-operation-id
        type: string
        description: |
          Custom identifier for tracking this async operation. If not provided,
          a unique ID is generated automatically.
      - name: idempotent
        type: bool
        description: |
          Succeed silently if no changes were made in the editor. Without this
          flag, the command errors when the configuration is unchanged.
      - name: async
        type: bool
        description: |
          Return immediately after initiating the operation instead of waiting
          for completion. Use the returned operation ID to check status later.
      - name: resource-version
        type: string
        short: v
        description: |
          Resource version for optimistic concurrency control. If not provided,
          the current version is fetched automatically.
  - name: cloud namespace delete
    summary: Delete a Temporal Cloud namespace
    description: |
      Delete a Temporal Cloud namespace and all associated data. This action is
      irreversible and will permanently remove all workflows, activities, and
      history within the namespace.

      Example:

      ```
      cloud namespace delete --namespace my-namespace.my-account
      ```
    has-init: false
    option-sets:
      - client
    options:
      - name: namespace
        type: string
        description: |
          The fully qualified namespace name in the format 'namespace.account'
          (e.g., 'my-namespace.my-account').
        short: n
        required: true
      - name: async-operation-id
        type: string
        description: |
          Custom identifier for tracking this async operation. If not provided,
          a unique ID is generated automatically.
      - name: async
        type: bool
        description: |
          Return immediately after initiating the operation instead of waiting
          for completion. Use the returned operation ID to check status later.
      - name: idempotent
        type: bool
        description: |
          Succeed silently if the namespace does not exist. Without this flag,
          the command errors if the namespace is not found.
      - name: resource-version
        type: string
        short: v
        description: |
          Resource version for optimistic concurrency control. If not provided,
          the current version is fetched automatically.
  - name: cloud namespace list
    summary: List Temporal Cloud namespaces
    description: |
      List all Temporal Cloud namespaces accessible with the current
      authentication credentials.

      Example:

      ```
      cloud namespace list
      ```
    has-init: false
    option-sets:
      - client
    options:
      - name: page-size
        type: int
        description: |
          Number of namespaces to return per page. Use for paginated results.
      - name: page-token
        type: string
        description: |
          Token for retrieving the next page of results in a paginated list.
      - name: name
        type: string
        description: |
          Filter namespaces by the name as defined in the specification of the namespace.

  # Namespace retention commands
  - name: cloud namespace retention
    summary: Manage namespace retention settings
    description: |
      Commands for managing data retention settings of Temporal Cloud namespaces.

      Retention determines how long closed workflow history data are stored before
      being automatically deleted.
    has-init: false
  - name: cloud namespace retention get
    summary: Get namespace retention period
    description: |
      Retrieve the current data retention period for a Temporal Cloud namespace.
      The retention period defines how long closed workflow history data are stored.

      Example:

      ```
      cloud namespace retention get --namespace my-namespace.my-account
      ```
    has-init: false
    option-sets:
      - client
      - namespace
  - name: cloud namespace retention set
    summary: Set namespace retention period
    description: |
      Set the data retention period for a Temporal Cloud namespace. The
      retention period defines how long closed workflow history data are stored.

      Example:

      ```
      cloud namespace retention set --namespace my-namespace.my-account --retention-days 14
      ```
    has-init: false
    option-sets:
      - client
      - namespace
      - async-operation
      - resource-version
    options:
      - name: retention-days
        type: int
        description: |
          New retention period in days for closed workflow history data.
        required: true

  # Namespace lifecycle commands
  - name: cloud namespace lifecycle
    summary: Manage namespace lifecycle settings
    description: |
      Commands for managing lifecycle settings of Temporal Cloud namespaces.

      Lifecycle settings control the behavior and protection of namespaces,
      including delete protection to prevent accidental deletion.
    has-init: false
  - name: cloud namespace lifecycle get
    summary: Get namespace lifecycle configuration
    description: |
      Retrieve the current lifecycle configuration for a Temporal Cloud namespace.
      Lifecycle settings include delete protection status.

      Example:

      ```
      cloud namespace lifecycle get --namespace my-namespace.my-account
      ```
    has-init: false
    option-sets:
      - client
    options:
      - name: namespace
        type: string
        description: |
          The fully qualified namespace name in the format 'namespace.account'
          (e.g., 'my-namespace.my-account').
        short: n
        required: true
  - name: cloud namespace lifecycle set
    summary: Set namespace lifecycle configuration
    description: |
      Set the lifecycle configuration for a Temporal Cloud namespace.
      Lifecycle settings include delete protection to prevent accidental deletion.

      Example:

      ```
      cloud namespace lifecycle set --namespace my-namespace.my-account --enable-delete-protection true
      ```
    has-init: false
    option-sets:
      - client
      - diff
    options:
      - name: namespace
        type: string
        description: |
          The fully qualified namespace name in the format 'namespace.account'
          (e.g., 'my-namespace.my-account').
        short: n
        required: true
      - name: enable-delete-protection
        type: bool
        description: |
          Enable or disable delete protection for the namespace. When enabled,
          the namespace cannot be deleted until this flag is set to false.
        required: true
      - name: async-operation-id
        type: string
        description: |
          Custom identifier for tracking this async operation. If not provided,
          a unique ID is generated automatically.
      - name: async
        type: bool
        description: |
          Return immediately after initiating the operation instead of waiting
          for completion. Use the returned operation ID to check status later.
      - name: idempotent
        type: bool
        description: |
          Succeed silently if the lifecycle configuration is already set to the
          specified value. Without this flag, the command errors when no change
          is needed.
      - name: resource-version
        type: string
        description: |
          Resource version for optimistic concurrency control. If not provided,
          the current version is fetched automatically.

  # Namespace cert-ca commands
  - name: cloud namespace cert-ca
    summary: Manage client CA certificates for namespaces
    description: |
      Commands for managing the client CA certificates of Temporal Cloud namespaces.
    has-init: false
  - name: cloud namespace cert-ca list
    summary: List CA certificates for a namespace
    description: |
      Retrieve the list of client CA certificates configured for a Temporal Cloud
      namespace. These certificates are used for client authentication.

      Example:

      ```
      cloud namespace cert-ca list --namespace my-namespace.my-account
      ```
    has-init: false
    option-sets:
      - client
      - namespace
  - name: cloud namespace cert-ca create
    summary: Add CA certificates to a namespace
    description: |
      Add client CA certificates to a Temporal Cloud namespace from a PEM file
      or base64 encoded string. These certificates are used to verify client
      connections and enable mTLS authentication.

      Specify either --ca-certificate-file or --ca-certificate, but not both.

      Example with file:

      ```
      cloud namespace cert-ca create --namespace my-namespace.my-account --ca-certificate-file ca-cert.pem
      ```

      Example with base64 encoded data:

      ```
      cloud namespace cert-ca create --namespace my-namespace.my-account --ca-certificate <base64-encoded-cert>
      ```
    has-init: false
    option-sets:
      - client
      - namespace
      - async-operation
      - resource-version
    options:
      - name: ca-certificate-file
        type: string
        description: |
          Path to a CA certificate PEM file. Mutually exclusive with --ca-certificate.
      - name: ca-certificate
        type: string
        description: |
          Base64 encoded CA certificate data. Mutually exclusive with --ca-certificate-file.

  - name: cloud namespace cert-ca delete
    summary: Delete CA certificates from a namespace
    description: |
      Delete client CA certificates from a Temporal Cloud namespace. This operation
      requires confirmation and will remove the specified certificates from the
      namespace configuration.

      Specify either --ca-certificate-file or --ca-certificate, but not both.

      Example with file:

      ```
      cloud namespace cert-ca delete --namespace my-namespace.my-account --ca-certificate-file ca-cert.pem
      ```

      Example with base64 encoded data:

      ```
      cloud namespace cert-ca delete --namespace my-namespace.my-account --ca-certificate <base64-encoded-cert>
      ```
    has-init: false
    option-sets:
      - client
      - namespace
      - async-operation
      - resource-version
    options:
      - name: ca-certificate-file
        type: string
        description: |
          Path to a CA certificate PEM file. Mutually exclusive with --ca-certificate.
      - name: ca-certificate
        type: string
        description: |
          Base64 encoded CA certificate data. Mutually exclusive with --ca-certificate-file.

  # Namespace cert-filter commands
  - name: cloud namespace cert-filter
    summary: Manage certificate filters for namespaces
    description: |
      Commands for managing certificate filters for Temporal Cloud namespaces.
      Certificate filters restrict mTLS connections to client certificates with
      specific distinguished name properties.
    has-init: false
  - name: cloud namespace cert-filter list
    summary: List certificate filters for a namespace
    description: |
      List all certificate filters configured for a Temporal Cloud namespace.
    has-init: false
    option-sets:
      - client
      - namespace
  - name: cloud namespace cert-filter create
    summary: Add certificate filters to a namespace
    description: |
      Add new certificate filters to a Temporal Cloud namespace. Certificate
      filters restrict mTLS connections to client certificates whose distinguished
      name properties match at least one of the filters.
    option-sets:
      - client
      - namespace
      - async-operation
      - resource-version
    options:
      - name: common-name
        type: string
        description: |
          The common name (CN) field from the certificate's distinguished name.
      - name: organization
        type: string
        description: |
          The organization (O) field from the certificate's distinguished name.
      - name: organizational-unit
        type: string
        description: |
          The organizational unit (OU) field from the certificate's distinguished name.
      - name: subject-alternative-name
        type: string
        description: |
          The subject alternative name (SAN) from the certificate.
  - name: cloud namespace cert-filter delete
    summary: Delete certificate filters from a namespace
    description: |
      Delete certificate filters from a Temporal Cloud namespace. Filters are
      matched by exact field equality.
    option-sets:
      - client
      - namespace
      - async-operation
      - resource-version
    options:
      - name: common-name
        type: string
        description: |
          The common name (CN) field from the certificate's distinguished name.
      - name: organization
        type: string
        description: |
          The organization (O) field from the certificate's distinguished name.
      - name: organizational-unit
        type: string
        description: |
          The organizational unit (OU) field from the certificate's distinguished name.
      - name: subject-alternative-name
        type: string
        description: |
          The subject alternative name (SAN) from the certificate.

  # Namespace search-attribute commands
  - name: cloud namespace search-attribute
    summary: Manage custom search attributes for namespaces
    description: |
      Commands for managing custom search attributes for Temporal Cloud namespaces.
      Search attributes enable filtering and searching workflows by custom fields.
    has-init: false
  - name: cloud namespace search-attribute list
    summary: List custom search attributes for a namespace
    description: |
      List all custom search attributes configured for a Temporal Cloud namespace.

      Example:

      ```
      cloud namespace search-attribute list --namespace my-namespace.my-account
      ```
    has-init: false
    option-sets:
      - client
      - namespace
  - name: cloud namespace search-attribute create
    summary: Create a custom search attribute for a namespace
    description: |
      Create a new custom search attribute for a Temporal Cloud namespace.

      Example:

      ```
      cloud namespace search-attribute create --namespace my-namespace.my-account --name MyField --type Keyword
      ```
    has-init: false
    option-sets:
      - client
      - namespace
      - async-operation
      - resource-version
    options:
      - name: name
        type: string
        required: true
        description: |
          The name of the search attribute to create.
      - name: type
        type: string
        required: true
        description: |
          The type of the search attribute. Valid values: Text, Keyword, Int, Double,
          Bool, Datetime, KeywordList.
  - name: cloud namespace search-attribute rename
    summary: Rename a custom search attribute
    description: |
      Rename an existing custom search attribute for a Temporal Cloud namespace.
      This operation preserves all existing data associated with the search attribute.

      Example:

      ```
      cloud namespace search-attribute rename --namespace my-namespace.my-account --existing-name OldField --new-name NewField
      ```
    has-init: false
    option-sets:
      - client
      - namespace
      - async-operation
      - resource-version
    options:
      - name: existing-name
        type: string
        required: true
        description: |
          The current name of the search attribute to rename.
      - name: new-name
        type: string
        required: true
        description: |
          The new name for the search attribute.

  # Namespace codec commands
  - name: cloud namespace codec
    summary: Manage codec server settings for namespaces
    description: |
      Commands for managing the codec server configuration of Temporal Cloud namespaces.

      The codec server is used to encode and decode payloads for workflows and activities.
    has-init: false
  - name: cloud namespace codec get
    summary: Get codec server configuration for a namespace
    description: |
      Retrieve the current codec server configuration for a Temporal Cloud namespace.

      Example:

      ```
      cloud namespace codec get --namespace my-namespace.my-account
      ```
    has-init: false
    option-sets:
      - client
      - namespace
  - name: cloud namespace codec set
    summary: Set codec server configuration for a namespace
    description: |
      Set the codec server configuration for a Temporal Cloud namespace.

      Example:

      ```
      cloud namespace codec set --namespace my-namespace.my-account --endpoint https://my-codec.example.com
      ```
    has-init: false
    option-sets:
      - client
      - namespace
      - async-operation
      - resource-version
    options:
      - name: endpoint
        type: string
        required: true
        description: |
          The codec server endpoint URL.
      - name: pass-access-token
        type: bool
        description: |
          Whether to pass the user access token to the codec server endpoint.
      - name: include-cross-origin-credentials
        type: bool
        description: |
          Whether to include cross-origin credentials in requests to the codec server.
      - name: custom-error-message-default-message
        type: string
        description: |
          A custom message to display for remote codec server errors.
      - name: custom-error-message-default-link
        type: string
        description: |
          A link to display alongside the custom error message for remote codec server errors.
  - name: cloud namespace codec delete
    summary: Delete codec server configuration from a namespace
    description: |
      Delete the codec server configuration from a Temporal Cloud namespace.

      Example:

      ```
      cloud namespace codec delete --namespace my-namespace.my-account
      ```
    has-init: false
    option-sets:
      - client
      - namespace
      - async-operation
      - resource-version

  # Namespace tag commands
  - name: cloud namespace tag
    summary: Manage namespace tags
    description: |
      Commands for managing tags of Temporal Cloud namespaces.

      Tags are key-value pairs used for organization and categorization of namespaces.
    has-init: false
  - name: cloud namespace tag list
    summary: List tags for a namespace
    description: |
      List all tags configured for a Temporal Cloud namespace.

      Example:

      ```
      cloud namespace tag list --namespace my-namespace.my-account
      ```
    has-init: false
    option-sets:
      - client
      - namespace
  - name: cloud namespace tag create
    summary: Create a tag for a namespace
    description: |
      Create a new tag for a Temporal Cloud namespace. Fails if a tag with
      the specified key already exists.

      Example:

      ```
      cloud namespace tag create --namespace my-namespace.my-account --key environment --value production
      ```
    has-init: false
    option-sets:
      - client
      - namespace
      - async-operation
    options:
      - name: key
        type: string
        required: true
        description: |
          The tag key.
      - name: value
        type: string
        required: true
        description: |
          The tag value.
  - name: cloud namespace tag update
    summary: Update a tag for a namespace
    description: |
      Update the value of an existing tag for a Temporal Cloud namespace.
      Fails if the specified tag key does not exist.

      Example:

      ```
      cloud namespace tag update --namespace my-namespace.my-account --key environment --value staging
      ```
    has-init: false
    option-sets:
      - client
      - namespace
      - async-operation
    options:
      - name: key
        type: string
        required: true
        description: |
          The tag key to update.
      - name: value
        type: string
        required: true
        description: |
          The new value for the tag.
  - name: cloud namespace tag delete
    summary: Delete a tag from a namespace
    description: |
      Delete a tag from a Temporal Cloud namespace by its key.

      Example:

      ```
      cloud namespace tag delete --namespace my-namespace.my-account --key environment
      ```
    has-init: false
    option-sets:
      - client
      - namespace
      - async-operation
    options:
      - name: key
        type: string
        required: true
        description: |
          The tag key to delete.

  # Namespace HA commands
  - name: cloud namespace ha
    summary: Manage High Availability settings for namespaces
    description: |
      Commands for managing High Availability (HA) settings of Temporal Cloud namespaces.

      HA settings control active region, managed failover, and replica regions.
    has-init: false
  - name: cloud namespace ha get
    summary: Get High Availability configuration for a namespace
    description: |
      Retrieve the current High Availability configuration for a Temporal Cloud namespace.
      Shows the active region and whether managed failover is enabled.

      Example:

      ```
      cloud namespace ha get --namespace my-namespace.my-account
      ```
    has-init: false
    option-sets:
      - client
      - namespace
  - name: cloud namespace ha update
    summary: Update High Availability configuration for a namespace
    description: |
      Update the High Availability configuration for a Temporal Cloud namespace.
      Use --disable-auto-failover to toggle Temporal-managed automatic failover.

      Example:

      ```
      cloud namespace ha update --namespace my-namespace.my-account --disable-auto-failover true
      ```
    has-init: false
    option-sets:
      - client
      - namespace
      - async-operation
      - resource-version
    options:
      - name: disable-auto-failover
        type: bool
        required: true
        description: |
          Set to true to disable Temporal-managed automatic failover for the namespace.
          Set to false to re-enable automatic failover.
  - name: cloud namespace ha region
    summary: Manage replica regions for a namespace
    description: |
      Commands for managing replica regions of Temporal Cloud namespaces.
    has-init: false
  - name: cloud namespace ha region list
    summary: List regions for a namespace
    description: |
      List all regions and their states for a Temporal Cloud namespace.

      Example:

      ```
      cloud namespace ha region list --namespace my-namespace.my-account
      ```
    has-init: false
    option-sets:
      - client
      - namespace
  - name: cloud namespace ha region add
    summary: Add a replica region to a namespace
    description: |
      Add a replica region to a Temporal Cloud namespace. The region will be added
      as a passive replica and can later be used for failover.

      Example:

      ```
      cloud namespace ha region add --namespace my-namespace.my-account --region aws-us-west-2
      ```
    has-init: false
    option-sets:
      - client
      - namespace
      - async-operation
      - resource-version
    options:
      - name: region
        type: string
        required: true
        description: |
          The region ID to add as a replica (e.g., aws-us-west-2).
  - name: cloud namespace ha region delete
    summary: Remove a replica region from a namespace
    description: |
      Remove a replica region from a Temporal Cloud namespace. Note that a 7-day
      cooldown period applies before the same region can be re-added.

      Example:

      ```
      cloud namespace ha region delete --namespace my-namespace.my-account --region aws-us-west-2
      ```
    has-init: false
    option-sets:
      - client
      - namespace
      - async-operation
      - resource-version
    options:
      - name: region
        type: string
        required: true
        description: |
          The region ID to remove (e.g., aws-us-west-2).
  - name: cloud namespace ha failover
    summary: Trigger a failover to a different region
    description: |
      Trigger a failover for a Temporal Cloud namespace to a different region.
      The target region must already be a replica region of the namespace.

      Example:

      ```
      cloud namespace ha failover --namespace my-namespace.my-account --region aws-us-west-2
      ```
    has-init: false
    option-sets:
      - client
      - namespace
      - async-operation
    options:
      - name: region
        type: string
        required: true
        description: |
          The target region to failover to (e.g., aws-us-west-2).

  # User commands
  - name: cloud user
    summary: Manage Temporal Cloud users
    description: |
      Commands for managing Temporal Cloud users.
    has-init: false
    docs:
      keywords:
        - user
        - management
      description-header: User Management Commands
      tags:
        - users
  - name: cloud user get
    summary: Retrieve user details
    description: |
      Retrieve the configuration and status of a Temporal Cloud user.

      Example:

      ```
      cloud user get --user-id my-user-id
      ```
    has-init: false
    option-sets:
      - client
      - user-identification
  - name: cloud user set-namespace-permissions
    summary: Set namespace permissions for a user
    description: |
      Add, update, or remove namespace-level permissions for a Temporal Cloud user.
      Changes are applied additively: namespaces not listed are left unchanged.

      Namespace access format: 'namespace=permission' where permission is one of: admin, write, read.
      To remove access to a namespace, pass an empty permission: 'namespace='.

      Specify the user with either --user-id or --user-email (not both).

      Example:

      ```
      # Grant write access to my-namespace and read access to other-namespace:
      cloud user set-namespace-permissions --user-id my-user-id \
        --namespace-access my-namespace.my-account=write \
        --namespace-access other-namespace.my-account=read

      # Remove access to a namespace:
      cloud user set-namespace-permissions --user-id my-user-id \
        --namespace-access my-namespace.my-account=
      ```
    has-init: false
    option-sets:
      - client
      - async-operation
      - resource-version
      - user-identification
    options:
      - name: namespace-access
        type: string[]
        required: true
        description: |
          Namespace access change in the format 'namespace=permission'.
          Permission must be one of: admin, write, read. Can be repeated.
          Use an empty permission (e.g. 'testns=') to remove access to a namespace.
          Changes are additive: namespaces not listed are left unchanged.
  - name: cloud user set-account-role
    summary: Set the account role for a user
    description: |
      Set the account-level role for a Temporal Cloud user.

      Account roles: owner, admin, developer, finance-admin, read, metrics-read.

      Specify the user with either --user-id or --user-email (not both).

      Example:

      ```
      cloud user set-account-role --user-id my-user-id --account-role developer
      cloud user set-account-role --user-email alice@example.com --account-role admin
      ```
    has-init: false
    option-sets:
      - client
      - async-operation
      - resource-version
      - user-identification
    options:
      - name: account-role
        type: string
        required: true
        description: |
          The account-level role to assign. Valid values: owner, admin, developer,
          finance-admin, read, metrics-read.
  - name: cloud user delete
    summary: Delete a Temporal Cloud user
    description: |
      Delete a Temporal Cloud user. This action is irreversible.

      Specify the user with either --user-id or --user-email (not both).

      Example:

      ```
      cloud user delete --user-id my-user-id
      cloud user delete --user-email alice@example.com
      ```
    has-init: false
    option-sets:
      - client
      - async-operation
      - resource-version
      - user-identification
  - name: cloud user edit
    summary: Interactively edit a user configuration
    description: |
      Open a user configuration in your default editor for interactive
      modification. After saving and closing the editor, the changes are
      applied to Temporal Cloud.

      The editor is determined by the EDITOR environment variable, falling
      back to 'vi' if not set.

      Specify the user with either --user-id or --user-email (not both).

      Example:

      ```
      cloud user edit --user-id my-user-id
      cloud user edit --user-email alice@example.com
      ```
    has-init: false
    option-sets:
      - client
      - diff
      - async-operation
      - resource-version
      - user-identification
  - name: cloud user apply
    summary: Create or update a user from a specification
    description: |
      Apply a user configuration to Temporal Cloud. Creates a new user invitation
      if the email does not exist, or updates the existing user to match the specification.

      The specification can be provided as inline JSON or loaded from a file
      by prefixing the path with '@'.

      Example with inline JSON:

      ```
      cloud user apply --spec '{"email": "alice@example.com", "access": {"account_access": {"role": "developer"}}}'
      ```

      Example with file path:

      ```
      cloud user apply --spec @user-spec.json
      ```
    has-init: false
    option-sets:
      - client
      - diff
      - async-operation
      - resource-version
    options:
      - name: spec
        type: string
        required: true
        description: |
          User configuration in JSON format. Provide inline JSON directly,
          or use '@path/to/file.json' to load from a file.
  - name: cloud user invite
    summary: Invite a user to Temporal Cloud
    description: |
      Invite a user to Temporal Cloud by email. Optionally assign an account-level
      role and namespace-level access permissions.

      Account roles: owner, admin, developer, finance-admin, read, metrics-read.
      Namespace access format: 'namespace=permission' where permission is one of: admin, write, read.

      Example:

      ```
      cloud user invite --email alice@example.com --account-role developer \
        --namespace-access my-namespace.my-account=write
      ```
    has-init: false
    option-sets:
      - client
      - async-operation
    options:
      - name: email
        type: string
        required: true
        description: |
          The email address of the user to invite.
      - name: account-role
        type: string
        description: |
          The account-level role to assign. Valid values: owner, admin, developer,
          finance-admin, read, metrics-read.
      - name: namespace-access
        type: string[]
        description: |
          Namespace access to grant, in the format 'namespace=permission'.
          Permission must be one of: admin, write, read. Can be repeated.
  - name: cloud user list
    summary: List Temporal Cloud users
    description: |
      List all Temporal Cloud users accessible with the current
      authentication credentials.

      Example:

      ```
      cloud user list
      ```
    has-init: false
    option-sets:
      - client
    options:
      - name: page-size
        type: int
        description: |
          Number of users to return per page. Use for paginated results.
      - name: page-token
        type: string
        description: |
          Token for retrieving the next page of results in a paginated list.
      - name: email
        type: string
        description: |
          Filter users by email address.
      - name: namespace
        type: string
        description: |
          Filter users by the namespace they have access to.

option-sets:
  - name: client
    options:
      - name: api-key
        type: string
        implied-env: TEMPORAL_API_KEY
        description: |
          API key for authenticating with Temporal Cloud. Can be used instead
          of interactive login for automation and CI/CD pipelines.
      - name: server
        type: string
        description: |
          Override the Temporal Cloud API server address. Used for connecting
          to non-production environments.
        hidden: true
        default: saas-api.tmprl-test.cloud:443
  - name: diff
    options:
      - name: verbose-diff
        type: bool
        description: |
          Show detailed differences between the current and desired namespace
          configurations when changes are detected.
  - name: common
    external-package: github.com/temporalio/cli/cliext
  - name: namespace
    options:
      - name: namespace
        type: string
        description: |
          The fully qualified namespace name in the format 'namespace.account'
          (e.g., 'my-namespace.my-account').
        short: n
        required: true
  - name: resource-version
    options:
      - name: resource-version
        type: string
        short: v
        description: |
          Resource version for optimistic concurrency control. If not provided,
          the current version is fetched automatically.
  - name: async-operation
    options:
      - name: idempotent
        type: bool
        description: |
          Succeed silently if the resource already matches the specification.
          Without this flag, the command errors when no changes are needed.
      - name: async-operation-id
        type: string
        description: |
          Custom identifier for tracking this async operation. If not provided,
          a unique ID is generated automatically.
      - name: async
        type: bool
        description: |
          Return immediately after initiating the operation instead of waiting
          for completion. Use the returned operation ID to check status later.
  - name: user-identification
    options:
      - name: user-id
        type: string
        description: |
          The ID of the user. Mutually exclusive with --user-email.
      - name: user-email
        type: string
        description: |
          The email address of the user. Mutually exclusive with --user-id.
