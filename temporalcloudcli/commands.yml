  - name: cloud user
    summary: Manage Temporal Cloud users
    description: |
      Commands for managing Temporal Cloud users.
    has-init: false
    docs:
      keywords:
        - user
        - management
      description-header: User Management Commands
      tags:
        - users
  - name: cloud user get
    summary: Retrieve user details
    description: |
      Retrieve the configuration and status of a Temporal Cloud user.

      Example:

      ```
      cloud user get --user-id my-user-id
      ```
    has-init: false
    option-sets:
      - client
      - user-identification
  - name: cloud user set-namespace-permissions
    summary: Set namespace permissions for a user
    description: |
      Add, update, or remove namespace-level permissions for a Temporal Cloud user.
      Changes are applied additively: namespaces not listed are left unchanged.

      Namespace access format: 'namespace=permission' where permission is one of: admin, write, read.
      To remove access to a namespace, pass an empty permission: 'namespace='.

      Specify the user with either --user-id or --user-email (not both).

      Example:

      ```
      # Grant write access to my-namespace and read access to other-namespace:
      cloud user set-namespace-permissions --user-id my-user-id \
        --namespace-access my-namespace.my-account=write \
        --namespace-access other-namespace.my-account=read

      # Remove access to a namespace:
      cloud user set-namespace-permissions --user-id my-user-id \
        --namespace-access my-namespace.my-account=
      ```
    has-init: false
    option-sets:
      - client
      - async-operation
      - resource-version
      - user-identification
    options:
      - name: namespace-access
        type: string[]
        required: true
        description: |
          Namespace access change in the format 'namespace=permission'.
          Permission must be one of: admin, write, read. Can be repeated.
          Use an empty permission (e.g. 'testns=') to remove access to a namespace.
          Changes are additive: namespaces not listed are left unchanged.
  - name: cloud user set-account-role
    summary: Set the account role for a user
    description: |
      Set the account-level role for a Temporal Cloud user.

      Account roles: owner, admin, developer, finance-admin, read, metrics-read.

      Specify the user with either --user-id or --user-email (not both).

      Example:

      ```
      cloud user set-account-role --user-id my-user-id --account-role developer
      cloud user set-account-role --user-email alice@example.com --account-role admin
      ```
    has-init: false
    option-sets:
      - client
      - async-operation
      - resource-version
      - user-identification
    options:
      - name: account-role
        type: string
        required: true
        description: |
          The account-level role to assign. Valid values: owner, admin, developer,
          finance-admin, read, metrics-read.
  - name: cloud user delete
    summary: Delete a Temporal Cloud user
    description: |
      Delete a Temporal Cloud user. This action is irreversible.

      Specify the user with either --user-id or --user-email (not both).

      Example:

      ```
      cloud user delete --user-id my-user-id
      cloud user delete --user-email alice@example.com
      ```
    has-init: false
    option-sets:
      - client
      - async-operation
      - resource-version
      - user-identification
  - name: cloud user edit
    summary: Interactively edit a user configuration
    description: |
      Open a user configuration in your default editor for interactive
      modification. After saving and closing the editor, the changes are
      applied to Temporal Cloud.

      The editor is determined by the EDITOR environment variable, falling
      back to 'vi' if not set.

      Specify the user with either --user-id or --user-email (not both).

      Example:

      ```
      cloud user edit --user-id my-user-id
      cloud user edit --user-email alice@example.com
      ```
    has-init: false
    option-sets:
      - client
      - diff
      - async-operation
      - resource-version
      - user-identification
  - name: cloud user apply
    summary: Create or update a user from a specification
    description: |
      Apply a user configuration to Temporal Cloud. Creates a new user invitation
      if the email does not exist, or updates the existing user to match the specification.

      The specification can be provided as inline JSON or loaded from a file
      by prefixing the path with '@'.

      Example with inline JSON:

      ```
      cloud user apply --spec '{"email": "alice@example.com", "access": {"account_access": {"role": "developer"}}}'
      ```

      Example with file path:

      ```
      cloud user apply --spec @user-spec.json
      ```
    has-init: false
    option-sets:
      - client
      - diff
      - async-operation
      - resource-version
    options:
      - name: spec
        type: string
        required: true
        description: |
          User configuration in JSON format. Provide inline JSON directly,
          or use '@path/to/file.json' to load from a file.
  - name: cloud user invite
    summary: Invite a user to Temporal Cloud
    description: |
      Invite a user to Temporal Cloud by email. Optionally assign an account-level
      role and namespace-level access permissions.

      Account roles: owner, admin, developer, finance-admin, read, metrics-read.
      Namespace access format: 'namespace=permission' where permission is one of: admin, write, read.

      Example:

      ```
      cloud user invite --email alice@example.com --account-role developer \
        --namespace-access my-namespace.my-account=write
      ```
    has-init: false
    option-sets:
      - client
      - async-operation
    options:
      - name: email
        type: string
        required: true
        description: |
          The email address of the user to invite.
      - name: account-role
        type: string
        description: |
          The account-level role to assign. Valid values: owner, admin, developer,
          finance-admin, read, metrics-read.
      - name: namespace-access
        type: string[]
        description: |
          Namespace access to grant, in the format 'namespace=permission'.
          Permission must be one of: admin, write, read. Can be repeated.
  - name: cloud user list
    summary: List Temporal Cloud users
    description: |
      List all Temporal Cloud users accessible with the current
      authentication credentials.

      Example:

      ```
      cloud user list
      ```
    has-init: false
    option-sets:
      - client
    options:
      - name: page-size
        type: int
        description: |
          Number of users to return per page. Use for paginated results.
      - name: page-token
        type: string
        description: |
          Token for retrieving the next page of results in a paginated list.
      - name: email
        type: string
        description: |
          Filter users by email address.
      - name: namespace
        type: string
        description: |
          Filter users by the namespace they have access to.

  # Account commands
  - name: cloud account
    summary: Manage Temporal Cloud account
    description: |
      Manage the Temporal Cloud account.
    has-init: false
    docs:
      keywords:
        - account
        - management
      description-header: Account Management Commands
      tags:
        - account

  - name: cloud account audit-log
    summary: Manage audit logs
    description: |
      Commands for working with account audit logs.
    has-init: false
    docs:
      keywords:
        - audit-log
        - account
      description-header: Audit Log Commands
      tags:
        - account

  - name: cloud account audit-log get
    summary: Get audit logs
    description: |
      Returns a paginated list of audit logs for the account, optionally filtered by time range.

      Example:
        temporal cloud account audit-log get --page-size 50
        temporal cloud account audit-log get --start-time 2024-01-01T00:00:00Z --end-time 2024-02-01T00:00:00Z
    has-init: false
    option-sets:
      - client
    options:
      - name: page-size
        type: int
        description: |
          Number of logs to retrieve per page. Cannot exceed 1000. Defaults to 100.
      - name: page-token
        type: string
        description: |
          Page token from a previous response to retrieve the next page.
      - name: start-time
        type: timestamp
        description: |
          Filter for logs at or after this UTC time (RFC3339 format, e.g. 2024-01-01T00:00:00Z). Defaults to 30 days ago.
      - name: end-time
        type: timestamp
        description: |
          Filter for logs before this UTC time (RFC3339 format, e.g. 2024-02-01T00:00:00Z). Defaults to current time.


  - name: cloud account audit-log sink
    summary: Manage audit log sinks
    description: |
      Commands for working with account audit log sinks.
    has-init: false
    docs:
      keywords:
        - audit-log
        - sink
        - account
      description-header: Audit Log Sink Commands
      tags:
        - account

  - name: cloud account audit-log sink get
    summary: Get an audit log sink
    description: |
      Returns the details of an audit log sink for the account.

      Example:
        temporal cloud account audit-log sink get --name my-sink
    has-init: false
    option-sets:
      - client
    options:
      - name: name
        type: string
        required: true
        description: |
          The name of the audit log sink to get.

  - name: cloud account audit-log sink list
    summary: List audit log sinks
    description: |
      Returns a paginated list of audit log sinks for the account.

      Example:
        temporal cloud account audit-log sink list
        temporal cloud account audit-log sink list --page-size 50
    has-init: false
    option-sets:
      - client
    options:
      - name: page-size
        type: int
        description: |
          Number of sinks to retrieve per page. Cannot exceed 1000. Defaults to 100.
      - name: page-token
        type: string
        description: |
          Page token from a previous response to retrieve the next page.

  - name: cloud account audit-log sink delete
    summary: Delete an audit log sink
    description: |
      Delete an audit log sink for the account. This action is irreversible.

      Example:
        temporal cloud account audit-log sink delete --name my-sink
    has-init: false
    option-sets:
      - client
      - async-operation
      - resource-version
    options:
      - name: name
        type: string
        required: true
        description: |
          The name of the audit log sink to delete.

  - name: cloud account audit-log sink enable
    summary: Enable an audit log sink
    description: |
      Enable an audit log sink for the account.

      Example:
        temporal cloud account audit-log sink enable --name my-sink
    has-init: false
    option-sets:
      - client
      - async-operation
      - resource-version
    options:
      - name: name
        type: string
        required: true
        description: |
          The name of the audit log sink to enable.

  - name: cloud account audit-log sink disable
    summary: Disable an audit log sink
    description: |
      Disable an audit log sink for the account.

      Example:
        temporal cloud account audit-log sink disable --name my-sink
    has-init: false
    option-sets:
      - client
      - async-operation
      - resource-version
    options:
      - name: name
        type: string
        required: true
        description: |
          The name of the audit log sink to disable.

  # API key commands
  - name: cloud apikey
    summary: Manage Temporal Cloud API keys
    description: |
      Commands for creating, listing, and managing Temporal Cloud API keys.

      API keys authenticate requests to the Temporal Cloud API.
    has-init: false
    docs:
      keywords:
        - apikey
        - api-key
        - management
      description-header: API Key Management Commands
      tags:
        - apikeys

  - name: cloud apikey list
    summary: List API keys
    description: |
      List API keys. Optionally filter by user ID, user email, or service account ID.
      At most one filter may be specified.

      Example:

      ```
      cloud apikey list
      cloud apikey list --user-id my-user-id
      cloud apikey list --service-account-id my-sa-id
      ```
    has-init: false
    option-sets:
      - client
    options:
      - name: user-id
        type: string
        description: |
          Filter API keys by user ID. Mutually exclusive with --user-email and --service-account-id.
      - name: user-email
        type: string
        description: |
          Filter API keys by user email. Mutually exclusive with --user-id and --service-account-id.
      - name: service-account-id
        type: string
        description: |
          Filter API keys by service account ID. Mutually exclusive with --user-id and --user-email.
      - name: page-size
        type: int
        description: |
          Number of API keys to return per page.
      - name: page-token
        type: string
        description: |
          Token for retrieving the next page of results.

  - name: cloud apikey get
    summary: Get API key details
    description: |
      Retrieve the configuration and status of a Temporal Cloud API key.

      Example:

      ```
      cloud apikey get --key-id my-key-id
      ```
    has-init: false
    option-sets:
      - client
    options:
      - name: key-id
        type: string
        required: true
        description: |
          The ID of the API key to retrieve.

  - name: cloud apikey create-for-service-account
    summary: Create an API key for a service account
    description: |
      Create a new API key owned by the specified service account.
      The token is printed once on creation and cannot be retrieved again.

      Example:

      ```
      cloud apikey create-for-service-account --service-account-id my-sa-id --display-name "My Key"
      ```
    has-init: false
    option-sets:
      - client
      - async-operation
    options:
      - name: service-account-id
        type: string
        required: true
        description: |
          The ID of the service account to create the API key for.
      - name: display-name
        type: string
        required: true
        description: |
          A human-readable display name for the API key.
      - name: description
        type: string
        description: |
          An optional description for the API key.
      - name: expiry-time
        type: timestamp
        description: |
          Expiry time for the API key in RFC3339 format (e.g. 2025-12-31T00:00:00Z).
          Mutually exclusive with --expiry-duration.
      - name: expiry-duration
        type: duration
        description: |
          Expiry duration relative to now (e.g. 30d, 24h, 90m).
          Supports days (d), hours (h), minutes (m), and seconds (s).
          Mutually exclusive with --expiry-time.

  - name: cloud apikey create-for-me
    summary: Create an API key for the current user
    description: |
      Create a new API key owned by the currently authenticated user.
      The token is printed once on creation and cannot be retrieved again.

      Example:

      ```
      cloud apikey create-for-me --display-name "My Key"
      ```
    has-init: false
    option-sets:
      - client
      - async-operation
    options:
      - name: display-name
        type: string
        required: true
        description: |
          A human-readable display name for the API key.
      - name: description
        type: string
        description: |
          An optional description for the API key.
      - name: expiry-time
        type: timestamp
        description: |
          Expiry time for the API key in RFC3339 format (e.g. 2025-12-31T00:00:00Z).
          Mutually exclusive with --expiry-duration.
      - name: expiry-duration
        type: duration
        description: |
          Expiry duration relative to now (e.g. 30d, 24h, 90m).
          Supports days (d), hours (h), minutes (m), and seconds (s).
          Mutually exclusive with --expiry-time.

  - name: cloud apikey delete
    summary: Delete an API key
    description: |
      Delete a Temporal Cloud API key. This action is irreversible.

      Example:

      ```
      cloud apikey delete --key-id my-key-id
      ```
    has-init: false
    option-sets:
      - client
      - async-operation
      - resource-version
    options:
      - name: key-id
        type: string
        required: true
        description: |
          The ID of the API key to delete.

  - name: cloud apikey update
    summary: Update an API key
    description: |
      Update an API key's display name, description, or disabled status.
      Only flags that are explicitly provided are changed.

      Example:

      ```
      cloud apikey update --key-id my-key-id --display-name "New Name"
      cloud apikey update --key-id my-key-id --disabled=true
      ```
    has-init: false
    option-sets:
      - client
      - async-operation
      - resource-version
    options:
      - name: key-id
        type: string
        required: true
        description: |
          The ID of the API key to update.
      - name: display-name
        type: string
        description: |
          New display name for the API key.
      - name: description
        type: string
        description: |
          New description for the API key.
      - name: disabled
        type: bool
        description: |
          Set to true to disable the API key, or false to enable it.

  - name: cloud apikey edit
    summary: Interactively edit an API key
    description: |
      Open an API key configuration in your default editor for interactive
      modification. After saving and closing the editor, the changes are
      applied to Temporal Cloud.

      The editor is determined by the EDITOR environment variable, falling
      back to 'vi' if not set.

      Example:

      ```
      cloud apikey edit --key-id my-key-id
      ```
    has-init: false
    option-sets:
      - client
      - diff
      - async-operation
      - resource-version
    options:
      - name: key-id
        type: string
        required: true
        description: |
          The ID of the API key to edit.

  - name: cloud apikey disable
    summary: Disable an API key
    description: |
      Disable a Temporal Cloud API key. Disabled keys cannot be used for authentication.

      Example:

      ```
      cloud apikey disable --key-id my-key-id
      ```
    has-init: false
    option-sets:
      - client
      - async-operation
      - resource-version
    options:
      - name: key-id
        type: string
        required: true
        description: |
          The ID of the API key to disable.

  - name: cloud apikey enable
    summary: Enable an API key
    description: |
      Enable a previously disabled Temporal Cloud API key.

      Example:

      ```
      cloud apikey enable --key-id my-key-id
      ```
    has-init: false
    option-sets:
      - client
      - async-operation
      - resource-version
    options:
      - name: key-id
        type: string
        required: true
        description: |
          The ID of the API key to enable.

option-sets:
  - name: client
    options:
      - name: api-key
        type: string
        implied-env: TEMPORAL_API_KEY
        description: |
          API key for authenticating with Temporal Cloud. Can be used instead
          of interactive login for automation and CI/CD pipelines.
      - name: server
        type: string
        description: |
          Override the Temporal Cloud API server address. Used for connecting
          to non-production environments.
        hidden: true
        default: saas-api.tmprl-test.cloud:443
  - name: diff
    options:
      - name: verbose-diff
        type: bool
        description: |
          Show detailed differences between the current and desired namespace
          configurations when changes are detected.
  - name: common
    external-package: github.com/temporalio/cli/cliext
  - name: namespace
    options:
      - name: namespace
        type: string
        description: |
          The fully qualified namespace name in the format 'namespace.account'
          (e.g., 'my-namespace.my-account').
        short: n
        required: true
  - name: resource-version
    options:
      - name: resource-version
        type: string
        short: v
        description: |
          Resource version for optimistic concurrency control. If not provided,
          the current version is fetched automatically.
  - name: async-operation
    options:
      - name: idempotent
        type: bool
        description: |
          Succeed silently if the resource already exists or matches the specification.
          Without this flag, the command errors when no changes are needed.
      - name: async-operation-id
        type: string
        description: |
          Custom identifier for tracking this async operation. If not provided,
          a unique ID is generated automatically.
      - name: async
        type: bool
        description: |
          Return immediately after initiating the operation instead of waiting
          for completion. Use the returned operation ID to check status later.
  - name: user-identification
    options:
      - name: user-id
        type: string
        description: |
          The ID of the user. Mutually exclusive with --user-email.
      - name: user-email
        type: string
        description: |
          The email address of the user. Mutually exclusive with --user-id.
  - name: codec-server
    options:
      - name: codec-endpoint
        type: string
        description: |
          HTTPS codec server endpoint URL.
      - name: codec-pass-access-token
        type: bool
        description: |
          Pass the user access token to the codec server endpoint.
      - name: codec-include-cross-origin-credentials
        type: bool
        description: |
          Include cross-origin credentials in codec server requests.
  - name: ca-certificate
    options:
      - name: ca-certificate
        type: string
        description: |
          Base64-encoded CA certificate for mTLS authentication.
          Mutually exclusive with --ca-certificate-file.
      - name: ca-certificate-file
        type: string
        description: |
          Path to a CA certificate PEM file for mTLS authentication.
          Mutually exclusive with --ca-certificate.
  - name: certificate-filter
    options:
      - name: certificate-filter
        type: string[]
        description: |
          Certificate filter as a JSON object (e.g. '{"commonName":"foo"}'). Repeat to add multiple.
      - name: certificate-filter-file
        type: string
        description: |
          Path to a JSON file containing a certificate filter object.
  - name: group-id
    options:
      - name: group-id
        type: string
        required: true
        description: |
          The ID of the user group.
  - name: export-sink
    options:
      - name: sink-name
        type: string
        required: true
        description: |
          The name of the export sink.
  - name: export-s3
    options:
      - name: role-name
        type: string
        required: true
        description: |
          The IAM role ARN that Temporal Cloud assumes for writing to S3.
      - name: bucket-name
        type: string
        required: true
        description: |
          The name of the destination S3 bucket.
      - name: region
        type: string
        required: true
        description: |
          The AWS region where the S3 bucket is located.
      - name: aws-account-id
        type: string
        required: true
        description: |
          The AWS account ID associated with the bucket and role.
      - name: kms-arn
        type: string
        description: |
          The AWS KMS key ARN for server-side encryption of exported data. Optional.
  - name: export-gcs
    options:
      - name: sa-id
        type: string
        required: true
        description: |
          The customer service account ID that Temporal Cloud impersonates for writing to GCS.
      - name: bucket-name
        type: string
        required: true
        description: |
          The name of the destination GCS bucket.
      - name: gcp-project-id
        type: string
        required: true
        description: |
          The GCP project ID associated with the bucket and service account.
      - name: region
        type: string
        required: true
        description: |
          The GCS bucket region.
