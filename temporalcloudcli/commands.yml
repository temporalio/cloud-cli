        required: true
        description: |
          The tag key to delete.

  # Namespace HA commands
  - name: cloud namespace ha
    summary: Manage High Availability settings for namespaces
    description: |
      Commands for managing High Availability (HA) settings of Temporal Cloud namespaces.

      HA settings control active region, managed failover, and replica regions.
    has-init: false
  - name: cloud namespace ha get
    summary: Get High Availability configuration for a namespace
    description: |
      Retrieve the current High Availability configuration for a Temporal Cloud namespace.
      Shows the active region, whether managed failover is enabled, and whether passive poller forwarding is enabled.

      Example:

      ```
      temporal cloud namespace ha get --namespace my-namespace.my-account
      ```
    has-init: false
    option-sets:
      - client
      - namespace
  - name: cloud namespace ha update
    summary: Update High Availability configuration for a namespace
    description: |
      Update the High Availability configuration for a Temporal Cloud namespace.
      Use --auto-failover to enable or disable Temporal-managed automatic failover.
      Use --passive-poller-forwarding to enable or disable passive poller forwarding.

      Example:

      ```
      temporal cloud namespace ha update \
          --namespace my-namespace.my-account \
          --auto-failover enabled \
          --passive-poller-forwarding disabled
      ```
    has-init: false
    option-sets:
      - client
      - namespace
      - async-operation
      - resource-version
    options:
      - name: auto-failover
        type: string-enum
        description: Enable or disable Temporal-managed automatic failover for the namespace.
        enum-values:
          - enabled
          - disabled
      - name: passive-poller-forwarding
        type: string-enum
        description: Enable or disable passive poller forwarding for the namespace.
        enum-values:
          - enabled
          - disabled
  - name: cloud namespace ha region
    summary: Manage replica regions for a namespace
    description: |
      Commands for managing replica regions of Temporal Cloud namespaces.
    has-init: false
  - name: cloud namespace ha region list
    summary: List regions for a namespace
    description: |
      List all regions and their states for a Temporal Cloud namespace.

      Example:

      ```
      temporal cloud namespace ha region list --namespace my-namespace.my-account
      ```
    has-init: false
    option-sets:
      - client
      - namespace
  - name: cloud namespace ha region add
    summary: Add a replica region to a namespace
    description: |
      Add a replica region to a Temporal Cloud namespace. The region will be added
      as a passive replica and can later be used for failover.

      Example:

      ```
      temporal cloud namespace ha region add --namespace my-namespace.my-account --region aws-us-west-2
      ```
    has-init: false
    option-sets:
      - client
      - namespace
      - async-operation
      - resource-version
    options:
      - name: region
        type: string
        required: true
        description: |
          The region ID to add as a replica (e.g., aws-us-west-2).
  - name: cloud namespace ha region delete
    summary: Remove a replica region from a namespace
    description: |
      Remove a replica region from a Temporal Cloud namespace. Note that a 7-day
      cooldown period applies before the same region can be re-added.

      Example:

      ```
      temporal cloud namespace ha region delete --namespace my-namespace.my-account --region aws-us-west-2
      ```
    has-init: false
    option-sets:
      - client
      - namespace
      - async-operation
      - resource-version
    options:
      - name: region
        type: string
        required: true
        description: |
          The region ID to remove (e.g., aws-us-west-2).
  - name: cloud namespace ha failover
    summary: Trigger a failover to a different region
    description: |
      Trigger a failover for a Temporal Cloud namespace to a different region.
      The target region must already be a replica region of the namespace.

      Example:

      ```
      temporal cloud namespace ha failover --namespace my-namespace.my-account --region aws-us-west-2
      ```
    has-init: false
    option-sets:
      - client
      - namespace
      - async-operation
    options:
      - name: region
        type: string
        required: true
        description: |
          The target region to failover to (e.g., aws-us-west-2).

  # Namespace capacity commands
  - name: cloud namespace capacity
    summary: Manage namespace capacity
    description: |
      Commands for managing the capacity of Temporal Cloud namespaces.

      Capacity controls whether a namespace runs in on-demand mode or
      provisioned mode (with a fixed TRU allocation).
    has-init: false
  - name: cloud namespace capacity get
    summary: Get namespace capacity information
    description: |
      Retrieve capacity information for a Temporal Cloud namespace, including
      the current mode (on-demand or provisioned), mode options, and recent usage stats.

      Example:

      ```
      temporal cloud namespace capacity get --namespace my-namespace.my-account
      ```
    has-init: false
    option-sets:
      - client
      - namespace
  - name: cloud namespace capacity update
    summary: Update namespace capacity
    description: |
      Update the capacity of a Temporal Cloud namespace. Choose either on-demand
      mode or provisioned mode (with a fixed TRU allocation).

      Example (switch to on-demand):

      ```
      temporal cloud namespace capacity update --namespace my-namespace.my-account --capacity-mode on_demand
      ```

      Example (switch to provisioned with 4 TRUs):

      ```
      temporal cloud namespace capacity update --namespace my-namespace.my-account --capacity-mode provisioned --capacity-value 4
      ```
    has-init: false
    option-sets:
      - client
      - namespace
      - async-operation
      - resource-version
    options:
      - name: capacity-mode
        type: string-enum
        enum-values: [on_demand, provisioned]
        required: true
        description: |
          Capacity mode for the namespace. Must be either 'on_demand' or 'provisioned'.
      - name: capacity-value
        type: float
        description: |
          The provisioned capacity in Temporal Resource Units (TRUs). Required and
          must be greater than 0 when --capacity-mode is 'provisioned'. Ignored
          when --capacity-mode is 'on_demand'.

