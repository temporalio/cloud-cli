          The new value for the tag.
  - name: cloud namespace tag delete
    summary: Delete a tag from a namespace
    description: |
      Delete a tag from a Temporal Cloud namespace by its key.

      Example:

      ```
      cloud namespace tag delete --namespace my-namespace.my-account --key environment
      ```
    has-init: false
    option-sets:
      - client
      - namespace
      - async-operation
    options:
      - name: key
        type: string
        required: true
        description: |
          The tag key to delete.

  # Namespace HA commands
  - name: cloud namespace ha
    summary: Manage High Availability settings for namespaces
    description: |
      Commands for managing High Availability (HA) settings of Temporal Cloud namespaces.

      HA settings control active region, managed failover, and replica regions.
    has-init: false
  - name: cloud namespace ha get
    summary: Get High Availability configuration for a namespace
    description: |
      Retrieve the current High Availability configuration for a Temporal Cloud namespace.
      Shows the active region and whether managed failover is enabled.

      Example:

      ```
      cloud namespace ha get --namespace my-namespace.my-account
      ```
    has-init: false
    option-sets:
      - client
      - namespace
  - name: cloud namespace ha update
    summary: Update High Availability configuration for a namespace
    description: |
      Update the High Availability configuration for a Temporal Cloud namespace.
      Use --disable-auto-failover to toggle Temporal-managed automatic failover.

      Example:

      ```
      cloud namespace ha update --namespace my-namespace.my-account --disable-auto-failover true
      ```
    has-init: false
    option-sets:
      - client
      - namespace
      - async-operation
      - resource-version
    options:
      - name: disable-auto-failover
        type: bool
        required: true
        description: |
          Set to true to disable Temporal-managed automatic failover for the namespace.
          Set to false to re-enable automatic failover.
  - name: cloud namespace ha region
    summary: Manage replica regions for a namespace
    description: |
      Commands for managing replica regions of Temporal Cloud namespaces.
    has-init: false
  - name: cloud namespace ha region list
    summary: List regions for a namespace
    description: |
      List all regions and their states for a Temporal Cloud namespace.

      Example:

      ```
      cloud namespace ha region list --namespace my-namespace.my-account
      ```
    has-init: false
    option-sets:
      - client
      - namespace
  - name: cloud namespace ha region add
    summary: Add a replica region to a namespace
    description: |
      Add a replica region to a Temporal Cloud namespace. The region will be added
      as a passive replica and can later be used for failover.

      Example:

      ```
      cloud namespace ha region add --namespace my-namespace.my-account --region aws-us-west-2
      ```
    has-init: false
    option-sets:
      - client
      - namespace
      - async-operation
      - resource-version
    options:
      - name: region
        type: string
        required: true
        description: |
          The region ID to add as a replica (e.g., aws-us-west-2).
  - name: cloud namespace ha region delete
    summary: Remove a replica region from a namespace
    description: |
      Remove a replica region from a Temporal Cloud namespace. Note that a 7-day
      cooldown period applies before the same region can be re-added.

      Example:

      ```
      cloud namespace ha region delete --namespace my-namespace.my-account --region aws-us-west-2
      ```
    has-init: false
    option-sets:
      - client
      - namespace
      - async-operation
      - resource-version
    options:
      - name: region
        type: string
        required: true
        description: |
          The region ID to remove (e.g., aws-us-west-2).
  - name: cloud namespace ha failover
    summary: Trigger a failover to a different region
    description: |
      Trigger a failover for a Temporal Cloud namespace to a different region.
      The target region must already be a replica region of the namespace.

      Example:

      ```
      cloud namespace ha failover --namespace my-namespace.my-account --region aws-us-west-2
      ```
    has-init: false
    option-sets:
      - client
      - namespace
      - async-operation
    options:
      - name: region
        type: string
        required: true
        description: |
          The target region to failover to (e.g., aws-us-west-2).

  # User group commands
  - name: cloud user-group
    summary: Manage Temporal Cloud user groups
    description: |
      Commands for managing Temporal Cloud user groups.
    has-init: false
    docs:
      keywords:
        - user-group
        - management
      description-header: User Group Management Commands
      tags:
        - user-groups
  - name: cloud user-group apply
    summary: Create or update a user group from a specification
    description: |
      Apply a user group configuration to Temporal Cloud. Creates a new user group
      if no group with the given display name exists, or updates the existing one
      to match the specification.

      The specification can be provided as inline JSON or loaded from a file
      by prefixing the path with '@'.

      Example with inline JSON:

      ```
      cloud user-group apply --spec '{"display_name": "Engineering", "cloud_group": {}, "access": {"account_access": {"role": "developer"}}}'
      ```

      Example with file path:

      ```
      cloud user-group apply --spec @user-group-spec.json
      ```
    has-init: false
    option-sets:
      - client
      - diff
      - async-operation
      - resource-version
    options:
      - name: spec
        type: string
        required: true
        description: |
          User group configuration in JSON format. Provide inline JSON directly,
          or use '@path/to/file.json' to load from a file.
  - name: cloud user-group create-cloud-group
    summary: Create a Temporal Cloud-managed user group
    description: |
      Create a new Temporal Cloud-managed user group. Members can be managed
      using the add-member and remove-member commands.

      Account roles: owner, admin, developer, finance-admin, read, metrics-read.
      Namespace access format: 'namespace=permission' where permission is one of: admin, write, read.

      Example:

      ```
      cloud user-group create-cloud-group --display-name "Engineering" \
        --account-role developer \
        --namespace-access my-namespace.my-account=write
      ```
    has-init: false
    option-sets:
      - client
      - async-operation
    options:
      - name: display-name
        type: string
        required: true
        description: |
          The display name of the user group.
      - name: account-role
        type: string
        description: |
          The account-level role to assign. Valid values: owner, admin, developer,
          finance-admin, read, metrics-read.
      - name: namespace-access
        type: string[]
        description: |
          Namespace access to grant, in the format 'namespace=permission'.
          Permission must be one of: admin, write, read. Can be repeated.
  - name: cloud user-group create-google-group
    summary: Create a Google-group-backed user group
    description: |
      Create a new user group backed by a Google Group. Members are managed
      via the Google Group itself.

      Account roles: owner, admin, developer, finance-admin, read, metrics-read.
      Namespace access format: 'namespace=permission' where permission is one of: admin, write, read.

      Example:

      ```
      cloud user-group create-google-group --display-name "Platform" \
        --google-group-email platform@example.com \
        --account-role developer
      ```
    has-init: false
    option-sets:
      - client
      - async-operation
    options:
      - name: display-name
        type: string
        required: true
        description: |
          The display name of the user group.
      - name: google-group-email
        type: string
        required: true
        description: |
          The email address of the Google Group.
      - name: account-role
        type: string
        description: |
          The account-level role to assign. Valid values: owner, admin, developer,
          finance-admin, read, metrics-read.
      - name: namespace-access
        type: string[]
        description: |
          Namespace access to grant, in the format 'namespace=permission'.
          Permission must be one of: admin, write, read. Can be repeated.
  - name: cloud user-group create-scim-group
    summary: Create a SCIM-backed user group
    description: |
      Create a new user group backed by a SCIM identity provider group.
      Members are managed via the upstream identity provider.

      Account roles: owner, admin, developer, finance-admin, read, metrics-read.
      Namespace access format: 'namespace=permission' where permission is one of: admin, write, read.

      Example:

      ```
      cloud user-group create-scim-group --display-name "Security" \
        --scim-idp-id idp-group-id-123 \
        --account-role read
      ```
    has-init: false
    option-sets:
      - client
      - async-operation
    options:
      - name: display-name
        type: string
        required: true
        description: |
          The display name of the user group.
      - name: scim-idp-id
        type: string
        required: true
        description: |
          The identity provider ID for the SCIM group.
      - name: account-role
        type: string
        description: |
          The account-level role to assign. Valid values: owner, admin, developer,
          finance-admin, read, metrics-read.
      - name: namespace-access
        type: string[]
        description: |
          Namespace access to grant, in the format 'namespace=permission'.
          Permission must be one of: admin, write, read. Can be repeated.
  - name: cloud user-group get
    summary: Retrieve user group details
    description: |
      Retrieve the configuration and status of a Temporal Cloud user group.

      Example:

      ```
      cloud user-group get --group-id my-group-id
      ```
    has-init: false
    option-sets:
      - client
      - group-id
  - name: cloud user-group list
    summary: List Temporal Cloud user groups
    description: |
      List all Temporal Cloud user groups accessible with the current
      authentication credentials.

      Example:

      ```
      cloud user-group list
      ```
    has-init: false
    option-sets:
      - client
    options:
      - name: page-size
        type: int
        description: |
          Number of user groups to return per page. Use for paginated results.
      - name: page-token
        type: string
        description: |
          Token for retrieving the next page of results in a paginated list.
      - name: namespace
        type: string
        description: |
          Filter user groups by the namespace they have access to.
      - name: display-name
        type: string
        description: |
          Filter user groups by display name.
      - name: google-group-email-address
        type: string
        description: |
          Filter user groups by Google group email address.
      - name: scim-group-idp-id
        type: string
        description: |
          Filter user groups by SCIM group IDP ID.

  - name: cloud user-group delete
    summary: Delete a Temporal Cloud user group
    description: |
      Delete a Temporal Cloud user group. This action is irreversible.

      Example:

      ```
      cloud user-group delete --group-id my-group-id
      ```
    has-init: false
    option-sets:
      - client
      - group-id
      - async-operation
      - resource-version
  - name: cloud user-group update
    summary: Update a Temporal Cloud user group
    description: |
      Update an existing Temporal Cloud user group's access settings.

      Provide at least one of --account-role or --namespace-access.

      Example:

      ```
      cloud user-group update --group-id my-group-id --account-role developer
      cloud user-group update --group-id my-group-id \
        --namespace-access my-namespace.my-account=write
      cloud user-group update --group-id my-group-id --account-role admin \
        --namespace-access my-namespace.my-account=write \
        --namespace-access other-namespace.my-account=read
      ```
    has-init: false
    option-sets:
      - client
      - group-id
      - async-operation
      - resource-version
    options:
      - name: account-role
        type: string
        description: |
          The account role to assign to the group.
          Role must be one of: admin, developer, finance-admin, read.
      - name: namespace-access
        type: string[]
        description: |
          Namespace access change in the format 'namespace=permission'.
          Permission must be one of: admin, write, read. Can be repeated.
          Use an empty permission (e.g. 'testns=') to remove access to a namespace.
          Changes are additive: namespaces not listed are left unchanged.
  - name: cloud user-group edit
    summary: Interactively edit a user group configuration
    description: |
      Open a user group configuration in your default editor for interactive
      modification. After saving and closing the editor, the changes are
      applied to Temporal Cloud.

      The editor is determined by the EDITOR environment variable, falling
      back to 'vi' if not set.

      Example:

      ```
      cloud user-group edit --group-id my-group-id
      ```
    has-init: false
    option-sets:
      - client
      - diff
      - group-id
      - async-operation
      - resource-version
  - name: cloud user-group set-account-role
    summary: Set the account role for a user group
    description: |
      Set the account-level role for a Temporal Cloud user group.

      Account roles: owner, admin, developer, finance-admin, read, metrics-read.

      Example:

      ```
      cloud user-group set-account-role --group-id my-group-id --account-role developer
      ```
    has-init: false
    option-sets:
      - client
      - group-id
      - async-operation
      - resource-version
    options:
      - name: account-role
        type: string
        required: true
        description: |
          The account-level role to assign. Valid values: owner, admin, developer,
          finance-admin, read, metrics-read.
  - name: cloud user-group set-namespace-permissions
    summary: Set namespace permissions for a user group
    description: |
      Add, update, or remove namespace-level permissions for a Temporal Cloud user group.
      Changes are applied additively: namespaces not listed are left unchanged.

      Namespace access format: 'namespace=permission' where permission is one of: admin, write, read.
      To remove access to a namespace, pass an empty permission: 'namespace='.

      Example:

      ```
      cloud user-group set-namespace-permissions --group-id my-group-id \
        --namespace-access my-namespace.my-account=write \
        --namespace-access other-namespace.my-account=read
      ```
    has-init: false
    option-sets:
      - client
      - group-id
      - async-operation
      - resource-version
    options:
      - name: namespace-access
        type: string[]
        required: true
        description: |
          Namespace access change in the format 'namespace=permission'.
          Permission must be one of: admin, write, read. Can be repeated.
          Use an empty permission (e.g. 'testns=') to remove access to a namespace.
          Changes are additive: namespaces not listed are left unchanged.

