    summary: Update a Temporal Cloud user group
    description: |
      Update an existing Temporal Cloud user group's access settings.

      Provide at least one of --account-role, --namespace-access, or --custom-role.

      Example:

      ```
      temporal cloud user-group update --group-id my-group-id --account-role developer
      temporal cloud user-group update --group-id my-group-id \
        --namespace-access my-namespace.my-account=write
      temporal cloud user-group update --group-id my-group-id --account-role admin \
        --namespace-access my-namespace.my-account=write \
        --namespace-access other-namespace.my-account=read
      ```
    has-init: false
    option-sets:
