    has-init: false
  - name: cloud namespace export gcs create
    summary: Create a GCS workflow history export sink
    description: |
      Create a new GCS workflow history export sink for a Temporal Cloud namespace.
      The sink is created in the enabled state.

      Example:

      ```
      temporal cloud namespace export gcs create --namespace my-namespace.my-account --sink-name my-sink \
        --service-account-email my-service-account@my-project.iam.gserviceaccount.com \
        --bucket-name my-bucket --region us-central1
      ```
    has-init: false
    option-sets:
      - client
      - namespace
      - async-operation
      - export-sink
      - export-gcs
      - export-gcs-region
  - name: cloud namespace export gcs update
    summary: Update a GCS workflow history export sink
    description: |
      Update the configuration of an existing GCS workflow history export sink.
      Only the flags you provide are changed; omitted flags keep their current
      values. The enabled/disabled state and region are also preserved.

      Example (rotate service account only):

      ```
      temporal cloud namespace export gcs update --namespace my-namespace.my-account --sink-name my-sink \
        --service-account-email my-new-service-account@my-project.iam.gserviceaccount.com
      ```
    has-init: false
    option-sets:
      - client
      - namespace
      - async-operation
      - resource-version
      - export-sink
    options:
      - name: service-account-email
        type: string
        description: |
          The email of the customer service account that Temporal Cloud impersonates
          for writing to GCS (e.g. my-sa@my-project.iam.gserviceaccount.com).
          The service account ID and GCP project ID are parsed from this email.
          If omitted, the current value is kept.
      - name: bucket-name
        type: string
        description: |
          The name of the destination GCS bucket.
          If omitted, the current value is kept.
  - name: cloud namespace export gcs validate
    summary: Validate a GCS workflow history export sink configuration
    description: |
      Validate a GCS workflow history export sink configuration without creating or updating it.
      A successful response means the configuration is valid.

      Example:

      ```
      temporal cloud namespace export gcs validate --namespace my-namespace.my-account --sink-name my-sink \
        --service-account-email my-service-account@my-project.iam.gserviceaccount.com \
        --bucket-name my-bucket --region us-central1
      ```
    has-init: false
    option-sets:
      - client
      - namespace
      - export-sink
      - export-gcs
      - export-gcs-region

  # Namespace codec commands
  - name: cloud namespace codec
    summary: Manage codec server settings for namespaces
    description: |
      Commands for managing the codec server configuration of Temporal Cloud namespaces.

      The codec server is used to encode and decode payloads for workflows and activities.
    has-init: false
  - name: cloud namespace codec get
    summary: Get codec server configuration for a namespace
    description: |
