      - name: description
        type: string
        description: |
          An optional description for the API key.
      - name: expiry-time
        type: timestamp
        description: |
          Expiry time for the API key in RFC3339 format (e.g. 2025-12-31T00:00:00Z).
          Mutually exclusive with --expiry-duration.
      - name: expiry-duration
        type: duration
        description: |
          Expiry duration relative to now (e.g. 30d, 24h, 90m).
          Supports days (d), hours (h), minutes (m), and seconds (s).
          Mutually exclusive with --expiry-time.

  - name: cloud apikey delete
    summary: Delete an API key
    description: |
      Delete a Temporal Cloud API key. This action is irreversible.

      Example:

      ```
      temporal cloud apikey delete --key-id my-key-id
      ```
    has-init: false
    option-sets:
      - client
      - async-operation
      - resource-version
    options:
      - name: key-id
        type: string
        required: true
        description: |
          The ID of the API key to delete.

  - name: cloud apikey update
    summary: Update an API key
    description: |
      Update an API key's display name, description, or disabled status.
      Only flags that are explicitly provided are changed.

      Example:

      ```
      temporal cloud apikey update --key-id my-key-id --display-name "New Name"
      temporal cloud apikey update --key-id my-key-id --disabled=true
      ```
    has-init: false
    option-sets:
      - client
      - async-operation
      - resource-version
    options:
      - name: key-id
        type: string
        required: true
        description: |
          The ID of the API key to update.
      - name: display-name
        type: string
        description: |
          New display name for the API key.
      - name: description
        type: string
        description: |
          New description for the API key.
      - name: disabled
        type: bool
        description: |
          Set to true to disable the API key, or false to enable it.

  - name: cloud apikey edit
    summary: Interactively edit an API key
    description: |
      Open an API key configuration in your default editor for interactive
      modification. After saving and closing the editor, the changes are
      applied to Temporal Cloud.

      The editor is determined by the EDITOR environment variable, falling
      back to 'vi' if not set.

      Example:

      ```
      temporal cloud apikey edit --key-id my-key-id
      ```
    has-init: false
    option-sets:
      - client
      - diff
      - async-operation
      - resource-version
    options:
      - name: key-id
        type: string
        required: true
        description: |
          The ID of the API key to edit.

  - name: cloud apikey disable
    summary: Disable an API key
    description: |
      Disable a Temporal Cloud API key. Disabled keys cannot be used for authentication.

      Example:

      ```
      temporal cloud apikey disable --key-id my-key-id
      ```
    has-init: false
    option-sets:
      - client
      - async-operation
      - resource-version
    options:
      - name: key-id
        type: string
        required: true
        description: |
          The ID of the API key to disable.

  - name: cloud apikey enable
    summary: Enable an API key
    description: |
      Enable a previously disabled Temporal Cloud API key.

      Example:

      ```
      temporal cloud apikey enable --key-id my-key-id
      ```
    has-init: false
    option-sets:
      - client
      - async-operation
      - resource-version
    options:
      - name: key-id
        type: string
        required: true
        description: |
          The ID of the API key to enable.

  - name: cloud async-operation
    summary: Manage async operations
    description: |
      Commands for working with Temporal Cloud async operations.
    has-init: false
    docs:
      keywords:
        - async-operation
        - async
        - operation
      description-header: Async Operation Commands
      tags:
        - async-operations

  - name: cloud async-operation get
    summary: Get async operation details
    description: |
      Retrieve the status and details of a Temporal Cloud async operation.

      Example:

      ```
      temporal cloud async-operation get --async-operation-id my-op-id
      ```
    has-init: false
    option-sets:
      - client
    options:
      - name: async-operation-id
        type: string
        required: true
        description: |
          The ID of the async operation to retrieve.

  - name: cloud async-operation await
    summary: Wait for an async operation to complete
    description: |
      Wait for a Temporal Cloud async operation to reach a terminal state.
      Polls the operation status until it completes, fails, or is cancelled.

      Example:

      ```
      temporal cloud async-operation await --async-operation-id my-op-id
      ```
    has-init: false
    docs:
      keywords:
        - cloud
        - async-operation
        - await
      description-header: Wait for async operation
      tags:
        - async-operations
    option-sets:
      - client
    options:
      - name: async-operation-id
        type: string
        required: true
        description: |
          The ID of the async operation to wait for.
      - name: poll-interval
        type: duration
        default: 1s
        description: |
          Time to wait between status checks when waiting for operation completion.
          Cannot be greater than 10 minutes.
          Supports minutes (m) and seconds (s). Default is 1s.

  # Region commands
  - name: cloud region
    summary: Manage Temporal Cloud regions
    description: |
      Commands for listing Temporal Cloud regions.
    has-init: false
    docs:
      keywords:
        - region
        - cloud-provider
      description-header: Region Commands
      tags:
        - region

  - name: cloud region get
    summary: Get a Temporal Cloud region
    description: |
      Get details for a specific Temporal Cloud region.

      Example:

      ```
      temporal cloud region get --region aws-us-east-1
      ```
    has-init: false
    option-sets:
      - client
    options:
      - name: region
        type: string
        required: true
        short: r
        description: |
          The ID of the region to get.

  - name: cloud region list
    summary: List available Temporal Cloud regions
    description: |
      List all available Temporal Cloud regions.

      Example:

      ```
      temporal cloud region list
      ```
    has-init: false
    option-sets:
      - client

option-sets:
  - name: client
    options:
      - name: api-key
        type: string
        implied-env: TEMPORAL_API_KEY
        description: |
          API key for authenticating with Temporal Cloud. Can be used instead
          of interactive login for automation and CI/CD pipelines.
      - name: server
        type: string
        description: |
          Override the Temporal Cloud API server address. Used for connecting
          to non-production environments.
        hidden: true
        default: saas-api.tmprl.cloud:443
  - name: diff
    options:
      - name: verbose-diff
        type: bool
        description: |
          Show detailed differences between the current and desired namespace
          configurations when changes are detected.
  - name: common
    external-package: github.com/temporalio/cli/cliext
  - name: namespace
    options:
      - name: namespace
        type: string
        description: |
          The fully qualified namespace name in the format 'namespace.account'
          (e.g., 'my-namespace.my-account').
        short: n
        required: true
  - name: resource-version
    options:
      - name: resource-version
        type: string
        short: v
        description: |
          Resource version for optimistic concurrency control. If not provided,
          the current version is fetched automatically.
  - name: async-operation
    options:
      - name: idempotent
        type: bool
        description: |
          Succeed silently if the resource already exists or matches the specification.
          Without this flag, the command errors when no changes are needed.
      - name: async-operation-id
        type: string
        description: |
          Custom identifier for tracking this async operation. If not provided,
          a unique ID is generated automatically.
      - name: async
        type: bool
        description: |
          Return immediately after initiating the operation instead of waiting
          for completion. Use the returned operation ID to check status later.
      - name: poll-interval
        type: duration
        default: 1s
        description: |
          Time to wait between status checks when waiting for operation completion.
          Cannot be greater than 10 minutes.
          Supports minutes (m) and seconds (s).
  - name: user-identification
    options:
      - name: user-id
        type: string
        description: |
          The ID of the user. Mutually exclusive with --user-email.
      - name: user-email
        type: string
        description: |
          The email address of the user. Mutually exclusive with --user-id.
  - name: codec-server
    options:
      - name: codec-endpoint
        type: string
        description: |
          HTTPS codec server endpoint URL.
      - name: codec-pass-access-token
        type: bool
        description: |
          Pass the user access token to the codec server endpoint.
      - name: codec-include-cross-origin-credentials
        type: bool
        description: |
          Include cross-origin credentials in codec server requests.
  - name: ca-certificate
    options:
      - name: ca-certificate
        type: string
        description: |
          Base64-encoded CA certificate for mTLS authentication.
          Mutually exclusive with --ca-certificate-file.
      - name: ca-certificate-file
        type: string
        description: |
          Path to a CA certificate PEM file for mTLS authentication.
          Mutually exclusive with --ca-certificate.
  - name: certificate-filter
    options:
      - name: certificate-filter
        type: string[]
        description: |
          Certificate filter as a JSON object (e.g. '{"commonName":"foo"}'). Repeat to add multiple.
      - name: certificate-filter-file
        type: string
        description: |
          Path to a JSON file containing a certificate filter object.
  - name: group-id
    options:
      - name: group-id
        type: string
        required: true
        description: |
          The ID of the user group.
  - name: role-id
    options:
      - name: role-id
        type: string
        required: true
        description: |
          The ID of the custom role.
  - name: custom-role
    options:
      - name: custom-role
        type: string[]
        description: |
          Custom role ID to assign. Repeat to assign multiple. When provided,
          replaces the existing custom role list.
  - name: export-sink
    options:
      - name: sink-name
        type: string
        required: true
        description: |
          The name of the export sink.
  - name: export-s3
    options:
      - name: role-arn
        type: string
        required: true
        description: |
          The IAM role ARN that Temporal Cloud assumes for writing to S3
          (e.g. arn:aws:iam::123456789012:role/my-role). The role name and
          AWS account ID are parsed from this ARN.
      - name: bucket-name
        type: string
        required: true
        description: |
          The name of the destination S3 bucket.
      - name: kms-arn
        type: string
        description: |
          The AWS KMS key ARN for server-side encryption of exported data. Optional.
  - name: export-s3-region
    options:
      - name: region
        type: string
        required: true
        description: |
          The AWS region where the S3 bucket is located.
  - name: export-gcs
    options:
      - name: service-account-email
        type: string
        required: true
        description: |
          The email of the customer service account that Temporal Cloud impersonates
          for writing to GCS (e.g. my-sa@my-project.iam.gserviceaccount.com).
          The service account ID and GCP project ID are parsed from this email.
      - name: bucket-name
        type: string
        required: true
        description: |
          The name of the destination GCS bucket.
  - name: export-gcs-region
    options:
      - name: region
        type: string
        required: true
        description: |
          The GCS bucket region.
