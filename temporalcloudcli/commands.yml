  # Custom role commands
  - name: cloud custom-role
    summary: '[Experimental] Manage Temporal Cloud custom roles'
    description: |
      Commands for managing Temporal Cloud custom roles.

      Custom roles enable fine-grained authorization by binding sets of
      permissions (resource + actions) to a named role that can be assigned
      to users, user groups, and service accounts.
    has-init: false
    docs:
      keywords:
        - custom-role
