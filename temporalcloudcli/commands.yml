    options:
      - name: name
        type: string
        required: true
        description: |
          The name of the audit log sink.
      - name: service-account-email
        type: string
        required: true
        description: |
          The email of the GCP service account that Temporal Cloud impersonates for
          writing records to the customer's PubSub topic
          (e.g. my-sa@my-project.iam.gserviceaccount.com). The service account ID and
          GCP project ID are parsed from this email.
      - name: topic-name
        type: string
        required: true
        description: |
          The destination PubSub topic name where audit logs will be sent.

  - name: cloud account audit-log sink pubsub update
    summary: Update a PubSub audit log sink
    description: |
      Updates an existing PubSub audit log sink for the account.

      Example:

      ```
      temporal cloud account audit-log sink pubsub update \
        --name my-sink \
        --service-account-email new-sa@new-project.iam.gserviceaccount.com \
        --topic-name new-topic
      ```
    has-init: false
    option-sets:
      - client
      - resource-version
      - async-operation
    options:
      - name: name
        type: string
        required: true
        description: |
          The name of the audit log sink to update.
      - name: service-account-email
        type: string
        description: |
          The email of the GCP service account that Temporal Cloud impersonates for
          writing records to the customer's PubSub topic
          (e.g. my-sa@my-project.iam.gserviceaccount.com). The service account ID and
          GCP project ID are parsed from this email.
      - name: topic-name
        type: string
        description: |
          The destination PubSub topic name where audit logs will be sent.

  - name: cloud account audit-log sink pubsub validate
    summary: Validate a PubSub audit log sink
    description: |
      Validates a PubSub audit log sink specification without creating or modifying any resources.

      Example:

      ```
      temporal cloud account audit-log sink pubsub validate \
        --name my-sink \
        --service-account-email my-sa@my-project.iam.gserviceaccount.com \
        --topic-name my-topic
      ```
    has-init: false
    option-sets:
      - client
    options:
      - name: service-account-email
        type: string
        required: true
        description: |
          The email of the GCP service account that Temporal Cloud impersonates for
          writing records to the customer's PubSub topic
          (e.g. my-sa@my-project.iam.gserviceaccount.com). The service account ID and
          GCP project ID are parsed from this email.
      - name: topic-name
        type: string
        required: true
        description: |
          The destination PubSub topic name where audit logs will be sent.

