# Temporal Cloud CLI commands
commands:
  - name: cloud
    summary: Temporal Cloud command-line interface
    description: |
      The Temporal Cloud CLI provides management and operations for Temporal Cloud.

      Example:

      ```
      cloud namespace
      ```
    has-init: true
    options:
      - name: config-file
        type: string
        description: |
          File path to read TOML config from, defaults to
          `$CONFIG_PATH/temporal/temporal.toml` where `$CONFIG_PATH` is defined
          as `$HOME/.config` on Unix, "$HOME/Library/Application Support" on
          macOS, and %AppData% on Windows.
        experimental: true
        implied-env: TEMPORAL_CONFIG_FILE
      - name: profile
        type: string
        description: Profile to use for config file.
        experimental: true
        implied-env: TEMPORAL_PROFILE
      - name: disable-config-file
        type: bool
        description: |
          If set, disables loading environment config from config file.
        experimental: true
      - name: disable-config-env
        type: bool
        description: |
          If set, disables loading environment config from environment
          variables.
        experimental: true
      - name: log-level
        type: string-enum
        enum-values:
          - debug
          - info
          - warn
          - error
          - never
        description: |
          Log level.
          Default is "info" for most commands and "warn" for `server start-dev`.
        default: info
      - name: log-format
        type: string-enum
        description: Log format.
        enum-values:
          - text
          - json
        hidden-legacy-values:
          - pretty
        default: text
      - name: output
        type: string-enum
        short: o
        description: Non-logging data output format.
        enum-values:
          - text
          - json
          - jsonl
          - none
        default: text
      - name: time-format
        type: string-enum
        description: Time format.
        enum-values:
          - relative
          - iso
          - raw
        default: relative
      - name: color
        type: string-enum
        description: Output coloring.
        enum-values:
          - always
          - never
          - auto
        default: auto
      - name: no-json-shorthand-payloads
        type: bool
        description: Raw payload output, even if the JSON option was used.
      - name: command-timeout
        type: duration
        description: |
          The command execution timeout. 0s means no timeout.
      - name: client-connect-timeout
        type: duration
        description: |
          The client connection timeout. 0s means no timeout.
      - name: config-dir
        type: string
        description: The directory to store the config into.
      - name: disable-pop-up
        type: bool
        description: Disable browser pop-up.
      - name: api-key
        type: string
        description: The api key to use for auth.
  - name: cloud login
    summary: Log into temporal cloud
    description: |
      Log into temporal cloud.
    has-init: false
    docs:
      keywords:
        - login
      description-header: Login
      tags:
        - login
    options:
      - name: domain
        type: string
        hidden: true
        description: The domain to log into.
        default: login.tmprl-test.cloud
      - name: audience
        type: string
        hidden: true
        default: https://saas-api.tmprl-test.cloud
        description: Used for login.
      - name: client-id
        type: string
        hidden: true
        default: CKpwBvLaP1nScTHfNip3smJMkzXzJsur
        description: Used for login.
      - name: reset
        type: bool
        description: Reset stored login configuration.
  - name: cloud namespace
    summary: Manage namespaces
    description: |
      Commands for managing namespaces.
    has-init: false
    docs:
      keywords:
        - namespace
        - management
      description-header: Namespace Management Commands
      tags:
        - namespaces
  - name: cloud namespace get
    summary: Get a namespace
    description: |
      Get a namespace from temporal cloud.
    has-init: false
    docs:
      keywords:
        - namespace
        - management
      description-header: Retrieve a namespace.
      tags:
        - namespaces
    options:
      - name: namespace
        required: true
        type: string
        description: The namespace to get, including the account. For example my-namespace.my-account.
        short: n
  - name: cloud namespace apply
    summary: Create or update a namespace
    description: |
      Apply a namespace configuration to Temporal Cloud. This command creates a
      new namespace or updates an existing one based on the provided specification.

      You can specify the namespace configuration using a JSON specification,
      provided either inline or as a file path.

      Example with inline JSON:

      ```
      cloud namespace apply --spec '{"name": "namespace-name", "region": "us-west-2", "retention_days": 7}'
      ```

      Example with file path:

      ```
      cloud namespace apply --spec @namespace-spec.json
      ```
    has-init: false
    options:
      - name: spec
        type: string
        description: JSON specification for the namespace configuration. Can be provided as inline JSON or as a file path. If the value starts with '@', it will be treated as a file path (e.g., '@config.json').
        short: s
        required: true
      - name: dry-run
        type: bool
        description: Validate the configuration without applying changes. Shows what would be created or updated.
      - name: async-operation-id
        type: string
        short: a
        description: The async operation id to use for the request, optional.
      - name: idempotent
        type: bool
        short: i
        description: Determines whether the command should error if there's nothing that has changed.
      - name: async
        type: bool
        short: c
        description: Determines whether the command should return immediately with the async operation or wait until it completes.
  - name: cloud namespace edit
    summary: Edit a namespace
    description: |
      Edit a namespace spec on Temporal Cloud. This command updates a namespace with changes
      specified by the user in an edit operation.

      Example:

      ```
      cloud namespace edit --namespace my-namespace.my-account
      ```
    has-init: false
    options:
      - name: namespace
        type: string
        description: The namespace to get, including the account. For example my-namespace.my-account.
        short: n
        required: true
      - name: async-operation-id
        type: string
        short: a
        description: The async operation id to use for the request, optional.
      - name: idempotent
        type: bool
        short: i
        description: Determines whether the command should error if there's nothing that has changed.
      - name: async
        type: bool
        short: c
        description: Determines whether the command should return immediately with the async operation or wait until it completes.
